name: Rust

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Verify Compute Witness Rust CLI fixture
        run: |
          cargo run -q -p proofpath-verifier --bin proofpath-compute-witness -- examples/compute-witness/job_manifest.accept.json > /tmp/rust_receipt_draft.accept.json
          diff -u examples/compute-witness/rust_receipt_draft.accept.json /tmp/rust_receipt_draft.accept.json

      - name: Verify live action-boundary metrics
        run: bash scripts/run_live_action_boundary_check.sh

      - name: Verify reusable ProofPath GitHub Action
        uses: ./
        with:
          audit-log: fixtures/action-boundary/dangerous-action-audit.jsonl
          metrics-output: /tmp/proofpath-action-boundary-metrics.json
          run-id: reusable-action-self-test
          expected-actions-total: "2"
          expected-actions-blocked: "1"
          expected-actions-accepted: "1"
          expected-unsafe-without-approval-blocked: "1"
          expected-unsafe-without-approval-false-accepts: "0"
          expected-safe-with-approval-false-blocks: "0"
          expected-audit-records-written: "2"
          expected-blocked-forwarded-count: "0"
          expected-accepted-forwarded-count: "1"
          expected-audit-hash-chain-present: "true"

      - name: Verify Personal Agent Guard demo
        run: bash examples/personal-agent-guard/run_demo_check.sh

      - name: Verify Agent Payment Guard demo
        run: bash examples/agent-payment-guard/run_demo_check.sh
